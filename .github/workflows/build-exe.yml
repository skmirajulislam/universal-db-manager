name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package

      - name: Isolate Fat JAR for jpackage
        # PowerShell commands to create a clean folder and move ONLY the Fat JAR into it
        run: |
          New-Item -ItemType Directory -Force -Path build_input
          Copy-Item -Path target\database_manager-1.0-SNAPSHOT.jar -Destination build_input\

      - name: Create EXE with jpackage
        run: >
          jpackage
          --input build_input
          --main-jar database_manager-1.0-SNAPSHOT.jar
          --main-class com.Main
          --name "UniversalDBManager"
          --app-version "1.0"
          --description "Universal DB Manager - PostgreSQL, MySQL, SQLite"
          --vendor "skmirajulislam"
          --win-shortcut
          --win-menu
          --win-dir-chooser
          --type exe
          --add-modules java.sql,java.naming,java.management,java.desktop,java.security.jgss,java.rmi,jdk.crypto.ec,jdk.crypto.cryptoki

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalDBManager-Windows-EXE
          path: "*.exe"
          retention-days: 30